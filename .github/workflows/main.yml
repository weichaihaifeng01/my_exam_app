name: Flet Android APK 自动化构建

on:
  push:
    branches: [ main ]      # 当代码推送到 main 分支时触发
  workflow_dispatch:        # 也支持在网页上手动触发

env:
  PYTHON_VERSION: '3.11'
  JAVA_VERSION: '17'

jobs:
  build-android-apk:
    name: 构建 Android APK
    runs-on: ubuntu-latest  # 使用 Ubuntu 作为构建环境[reference:3]
    timeout-minutes: 120

    steps:
    - name: 检出源代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: 安装项目依赖
      run: |
        python -m pip install --upgrade pip
        pip install -e .   # 这行会读取 pyproject.toml 并安装所有依赖[reference:4]

    - name: 配置 Java 环境
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: ${{ env.JAVA_VERSION }}
        cache: 'gradle'

    - name: 执行 APK 构建
      run: |
        flet build apk --split-per-abi  # 按CPU架构拆分，生成更小的APK[reference:5]
